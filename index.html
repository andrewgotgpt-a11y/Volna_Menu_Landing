<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volna Lounge — Добро пожаловать</title>
    <!-- Подключаем Montserrat для интерфейса и Cormorant Garamond для оригинального стиля логотипа -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #111317;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px 24px;
            overflow-x: hidden;
        }

        /* Фоновое мягкое свечение */
        body::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -20%;
            width: 140%;
            height: 50%;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.04) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* Блок логотипа */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
        }

        /* Стилизация векторного SVG логотипа по мотивам logo.jpg */
        .vector-logo {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.4));
            margin-bottom: 10px;
        }

        .welcome-text {
            font-size: 12px;
            font-weight: 400;
            color: #8e94a0;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        /* Сетка кнопок */
        .buttons-grid {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Кнопка акции (Акцентная) */
        .btn-promo {
            background: #1c1f26;
            color: #ffffff;
            border: 1px solid #c5a059;
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.12);
        }
        
        .btn-promo .btn-title {
            color: #c5a059;
            font-weight: 600;
        }

        /* Стандартные кнопки */
        .btn-standard {
            background: #1c1f26;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Кнопки меню с волновой текстурой в углу */
        .btn-wave {
            background: linear-gradient(135deg, #1c1f26 0%, #15181e 100%);
            border: 1px solid rgba(197, 160, 89, 0.25);
        }
        
        .btn-wave::after {
            content: "";
            position: absolute;
            bottom: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            background: repeating-radial-gradient(circle, transparent, transparent 8px, rgba(197, 160, 89, 0.02) 9px, rgba(197, 160, 89, 0.02) 11px);
            border-radius: 50%;
        }

        /* Отклик на нажатие (фидбек для пальца) */
        .btn:active {
            transform: scale(0.98);
            background: #15181e;
            border-color: rgba(197, 160, 89, 0.5);
        }

        .btn-subtitle {
            font-size: 11px;
            color: #8e94a0;
            margin-top: 5px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* Соцсети в подвале */
        .footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 1;
        }

        .social-icons {
            display: flex;
            gap: 24px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #1c1f26;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #8e94a0;
            transition: all 0.3s ease;
        }

        .social-link:active {
            color: #c5a059;
            border-color: #c5a059;
            background: #15181e;
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .copyright {
            font-size: 10px;
            color: #4a4f5a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Логотип заведения (Полный вектор по мотивам оригинального logo.jpg) -->
        <div class="logo-section">
            <svg class="vector-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <!-- Градиент благородного золота в тон заведения -->
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#9a7432" />
                        <stop offset="25%" stop-color="#c5a059" />
                        <stop offset="50%" stop-color="#f3e1b9" />
                        <stop offset="75%" stop-color="#c5a059" />
                        <stop offset="100%" stop-color="#9a7432" />
                    </linearGradient>
                </defs>
                
                <!-- Внешнее золотое кольцо -->
                <circle cx="100" cy="100" r="86" stroke="url(#goldGradient)" stroke-width="2.5" />
                <!-- Внутренняя тонкая золотая кайма-акцент -->
                <circle cx="100" cy="100" r="82" stroke="url(#goldGradient)" stroke-width="0.7" stroke-opacity="0.6" />
                
                <!-- Аутентичный текст ВОЛНА по центру -->
                <text x="100" y="96" font-family="'Cormorant Garamond', serif" font-size="34" font-weight="600" fill="url(#goldGradient)" text-anchor="middle" letter-spacing="3">ВОЛНА</text>
                
                <!-- Векторные дизайнерские волны в нижней трети круга -->
                <g stroke="url(#goldGradient)" stroke-width="1.2" stroke-linecap="round">
                    <!-- Первая (верхняя) волна -->
                    <path d="M22 110 C 50 125, 75 95, 120 115 C 150 128, 165 110, 178 110" />
                    <!-- Вторая волна -->
                    <path d="M24 120 C 52 135, 77 105, 122 125 C 152 138, 163 122, 176 120" stroke-opacity="0.9"/>
                    <!-- Третья волна -->
                    <path d="M28 132 C 55 145, 80 118, 125 137 C 150 148, 160 134, 172 132" stroke-opacity="0.7" stroke-width="1.0"/>
                    <!-- Четвертая (нижняя) волна -->
                    <path d="M36 145 C 60 155, 85 132, 126 149 C 145 157, 153 148, 164 145" stroke-opacity="0.5" stroke-width="0.8"/>
                </g>
            </svg>
            <div class="welcome-text">Добро пожаловать</div>
        </div>

        <!-- Набор кнопок управления путешествием гостя -->
        <div class="buttons-grid">
            
            <!-- Кнопка 1: Отзывы и программа лояльности -->
            <a href="ВСТАВЬ_ССЫЛКУ_НА_ЯНДЕКС_КАРТЫ" class="btn btn-promo">
                <span class="btn-title">Получи скидку 10% за отзыв</span>
                <span class="btn-subtitle">Покажи скриншот сотруднику бара</span>
            </a>

            <!-- Кнопка 2: Авторизация в Wi-Fi -->
            <a href="ВСТАВЬ_ССЫЛКУ_НА_WIFLY" class="btn btn-standard">
                <span class="btn-title">Подключиться к Wi-Fi</span>
                <span class="btn-subtitle">Сеть: Volna_Lounge</span>
            </a>

            <!-- Кнопка 3: Основное меню (Прямая ссылка на PDF Google Диска) -->
            <a href="ВСТАВЬ_ПРЯМУЮ_ССЫЛКУ_НА_ОСНОВНОЙ_PDF" class="btn btn-standard btn-wave">
                <span class="btn-title" style="font-weight: 600;">Открыть меню заведения</span>
                <span class="btn-subtitle" style="color: rgba(197, 160, 89, 0.7);">Кальяны, бар, закуски и десерты</span>
            </a>

            <!-- Кнопка 4: Коктейльная карта (Прямая ссылка на PDF Google Диска) -->
            <a href="ВСТАВЬ_ПРЯМУЮ_ССЫЛКУ_НА_КОКТЕЙЛИ_PDF" class="btn btn-standard btn-wave">
                <span class="btn-title" style="font-weight: 600;">Коктейльная карта</span>
                <span class="btn-subtitle" style="color: rgba(197, 160, 89, 0.7);">Авторские миксы и классика</span>
            </a>

        </div>
    </div>

    <!-- Подвал с социальными сетями -->
    <div class="footer">
        <div class="social-icons">
            <!-- VK -->
            <a href="ВСТАВЬ_ССЫЛКУ_НА_ВК" class="social-link" aria-label="ВКонтакте">
                <svg viewBox="0 0 24 24">
                    <path d="M22.1 4.9c.2-.7 0-1.2-.9-1.2h-3.1c-.8 0-1.1.4-1.3.8 0 0-1.6 3.8-3.8 6.3-.7.7-1 .9-1.4.9-.2 0-.5-.2-.5-.9V4.9c0-.8-.2-1.2-.9-1.2H5.7c-.5 0-.8.3-.8.7 0 .7 1 .9 1.1 2.9V11.7c0 .9-.2 1.1-.5 1.1-.9 0-3-3.8-4.3-8.2-.3-.8-.6-1.1-1.4-1.1H.6c-.9 0-1 .4-1 .8 0 .8 1 4.9 4.8 10.3C7 18.7 10 20.3 12.7 20.3c1.6 0 1.8-.4 1.8-1V16.5c0-.9.2-1.1.8-1.1.5 0 1.3.3 3.1 2 2.1 2.1 2.4 3 3.6 3h3.1c.9 0 1.3-.4 1-1.3-.3-1-1.5-2.4-2-3.1-.5-.7-.9-1.2-.7-1.6.2-.5 1-1.6 2.1-3 1.4-1.9 2-3.1 1.8-3.5z"/>
                </svg>
            </a>
            <!-- Instagram -->
            <a href="ВСТАВЬ_ССЫЛКУ_НА_ИНСТ" class="social-link" aria-label="Instagram">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2.1c3.2 0 3.6 0 4.9.1 1.2.1 1.8.3 2.2.5.6.2 1 .5 1.4 1 .5.4.8.8 1 1.4.2.4.4 1 .5 2.2.1 1.3.1 1.6.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 1.8-.5 2.2-.2.6-.5 1-1 1.4-.4.5-.8.8-1.4 1-.4.2-1 .4-2.2.5-1.3.1-1.6.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-1.8-.3-2.2-.5-.6-.2-1-.5-1.4-1-.5-.4-.8-.8-1-1.4-.2-.4-.4-1-.5-2.2-.1-1.3-.1-1.6-.1-4.9s0-3.6.1-4.9c.1-1.2.3-1.8.5-2.2.2-.6.5-1 1-1.4.4-.5.8-.8 1.4-1 .4-.2 1-.4 2.2-.5 1.3-.1 1.6-.1 4.9-.1M12 0C8.7 0 8.3 0 7 2.1 5.7 2.2 4.8 2.4 4.1 2.7c-.8.3-1.4.7-2 1.4-.7.6-1.1 1.2-1.4 2C.4 6.8.2 7.7.1 9c-.1 1.3-.1 1.7-.1 5s0 3.7.1 5c.1 1.3.3 2.2.6 2.9.3.8.7 1.4 1.4 2 .6.7 1.2 1.1 2 1.4.7.3 1.6.5 2.9.6 1.3.1 1.7.1 5 .1s3.7 0 5-.1c1.3-.1 2.2-.3 2.9-.6.8-.3 1.4-.7 2-1.4.7-.6 1.1-1.2 1.4-2 .3-.7.5-1.6.6-2.9.1-1.3.1-1.7.1-5s0-3.7-.1-5c-.1-1.3-.3-2.2-.6-2.9-.3-.8-.7-1.4-1.4-2-.6-.7-1.2-1.1-2-1.4-.7-.3-1.6-.5-2.9-.6-1.3-.1-1.7-.1-5-.1L12 0zm0 5.8C8.6 5.8 5.8 8.6 5.8 12s2.8 6.2 6.2 6.2 6.2-2.8 6.2-6.2S15.4 5.8 12 5.8zm0 10.4c-2.3 0-4.2-1.9-4.2-4.2s1.9-4.2 4.2-4.2 4.2 1.9 4.2 4.2-1.9 4.2-4.2 4.2zm6.8-11.3c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5z"/>
                </svg>
            </a>
        </div>
        <div class="copyright">© Volna Lounge</div>
    </div>

</body>
</html>
